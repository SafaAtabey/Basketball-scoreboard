<!DOCTYPE html>
    <html>
        <head>
            <meta charset="UTF-8">
            <title>Basketball Scoreboard</title>
            <link rel="stylesheet" href="index.css">
            <link href="https://fonts.cdnfonts.com/css/cursed-timer-ulil" rel="stylesheet">
                
        </head>
        <body>
            <div class="cotainer">
                <div class="home">
                    <h1 id="title">HOME</h1>
                    <div class="numbers">
                        <h1 class="number" id="home_number">0</h1>
                    </div>
                    <div class="point-container">
                        <div class="point">
                            <button class="increase-btn" onclick="home_one()">+1</button>
                            <button class="increase-btn" onclick="home_two()">+2</button>
                            <button class="increase-btn" onclick="home_three()">+3</button>
                        </div>
                    </div>
                </div>
                <div class="home">
                    <div class="numbers">
                        <h1 class="number" id="guest_number">0</h1>
                    </div>
                    <div class="point-container">
                        <div class="point">
                            <button class="increase-btn" onclick="guest_one()">+1</button>
                            <button class="increase-btn" onclick="guest_two()">+2</button>
                            <button class="increase-btn" onclick="guest_three()">+3</button>
                        </div>
                    </div>
                </div>
            </div>
            <script src="index.js"></script>
        </body>
    </html>
